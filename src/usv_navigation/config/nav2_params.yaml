    - nav2_spin_cancel_bt_node
    - nav2_back_up_cancel_bt_node

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]



    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 30.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # Regulated Pure Pursuit is great for boats (curves smoothly)
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.2
      max_vel_x: 0.2
      max_vel_theta: 3.0
      min_vel_theta: -3.0
      lookahead_dist: 1.2
      min_lookahead_dist: 1.2
      max_lookahead_dist: 1.2
      lookahead_time: 1.0
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.4
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 2.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.5
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 1.0
      rotate_to_heading_min_angle: 0.2
      allow_reversing: true
      rotate_for_width: false
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
      interpolate_curvature_after_goal: true

behavior_server:
  ros__parameters:
    use_sim_time: True

smoother_server:
  ros__parameters:
    use_sim_time: True

velocity_smoother:
  ros__parameters:
    use_sim_time: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      allow_unknown: true
      downsample_costmap: true
      downsampling_factor: 2
      tolerance: 0.25
      minimum_turning_radius: 3.0
      allow_reversing: true
      reverse_penalty: 2.0
      change_penalty: 0.1
      non_straight_penalty: 1.2
      cost_penalty: 5.0
      analytic_expansion_ratio: 2.0 # Stability: Keep at 2.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      use_quadratic_cost: false # Stability: Keep disabled
      boundary_expansion_side_length: 3.0
      lookup_table_size: 20.0
      smoother:
        max_iterations: 0 # Stability: Use smoother_server instead

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.1
      footprint: "[ [0.6, 0.375], [0.6, -0.375], [-0.6, -0.375], [-0.6, 0.375] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 30.0
          raytrace_min_range: 0.8
          obstacle_max_range: 25.0
          obstacle_min_range: 0.8
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[ [0.6, 0.375], [0.6, -0.375], [-0.6, -0.375], [-0.6, 0.375] ]"
      resolution: 0.1
      track_unknown_space: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 30.0
          raytrace_min_range: 0.8
          obstacle_max_range: 25.0
          obstacle_min_range: 0.8
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.5

map_server:
  ros__parameters:
    use_sim_time: True
    # yaml_filename: "turtlebot3_world.yaml"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names: ['controller_server', 'planner_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother', 'smoother_server', '/local_costmap/local_costmap', '/global_costmap/global_costmap']